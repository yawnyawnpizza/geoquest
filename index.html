<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:monospace;
}

/* ================= TERMINAL ================= */
#menu{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff88;
  padding:20px;
  z-index:20000;
  white-space:pre-wrap;
}

.cursor{
  display:inline-block;
  width:10px;
  background:#00ff88;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* ================= VIEW ================= */
#viewer{
  width:100%;
  height:100%;
  filter:blur(10px);
  transition:filter 0.6s ease;
}

/* ================= HUD ================= */
#hud{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:8px;
}

/* ================= MAP ================= */
#mapPanel{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:40%;
  background:#111;
  transform:translateY(100%);
  transition:0.3s;
  z-index:5000;
}

#mapPanel.open{
  transform:translateY(0);
}

#map{
  width:100%;
  height:100%;
}

/* ================= BUTTONS ================= */
button{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* MAP BUTTON */
#mapBtn{
  position:fixed;
  left:10px;
  bottom:10px;
  z-index:9999;
  background:#c9a84c;
}

/* GUESS BUTTON ALWAYS VISIBLE */
#guessBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:999999;
  background:white;
}

/* NEXT BUTTON */
#nextBtn{
  position:fixed;
  right:10px;
  top:10px;
  z-index:9999;
  display:none;
}

/* ================= RESULTS SCREEN ================= */
#results{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999999;
}

#resultsBox{
  background:#111;
  color:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:280px;
  border:1px solid #333;
}

#resultsBox h2{
  margin:0 0 10px 0;
}

#resultsBox p{
  margin:6px 0;
  color:#ccc;
}

#resNext{
  margin-top:15px;
  background:#c9a84c;
}
</style>
</head>

<body>

<!-- ================= TERMINAL ================= -->
<div id="menu">
<div id="terminal"></div>
</div>

<!-- ================= GAME ================= -->
<div id="viewer"></div>

<div id="hud">
Round: <span id="round">0</span>/5 |
Score: <span id="score">0</span> |
Hint: <span id="hint">---</span>
</div>

<div id="mapPanel">
  <div id="map"></div>
</div>

<button id="mapBtn">Map</button>
<button id="guessBtn">Guess</button>
<button id="nextBtn">Next</button>

<!-- RESULTS -->
<div id="results">
  <div id="resultsBox">
    <h2>Result</h2>
    <p id="resDistance"></p>
    <p id="resPoints"></p>
    <button id="resNext">Next Round</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script type="module">

import { Viewer } from "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/+esm";

/* ================= LOCATIONS ================= */

const LOCATIONS = [
  {name:"NYC",lat:40.7128,lng:-74.0060,pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg",hint:"North America"},
  {name:"Paris",lat:48.8566,lng:2.3522,pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere-test.jpg",hint:"Europe"},
  {name:"Tokyo",lat:35.6762,lng:139.6503,pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere-small.jpg",hint:"Asia"}
];

let viewer,map,pin;
let current,guessPos;

let round=0,score=0;

/* ================= TERMINAL ================= */

let lines=[];
let input="";
const terminal=document.getElementById("terminal");

function boot(){
  lines.push("GeoQuest booting...");
  lines.push("systems online...");
  lines.push("type start()");
  render();
}

function render(){
  terminal.innerHTML =
    lines.join("\n") +
    "\n\n> " + input +
    "<span class='cursor'></span>";
}

/* ================= INPUT ================= */

document.addEventListener("keydown",(e)=>{

  if(document.getElementById("menu").style.display==="none") return;

  if(e.key==="Backspace"){
    input=input.slice(0,-1);
  }
  else if(e.key==="Enter"){
    lines.push("> " + input);
    execute(input);
    input="";
  }
  else if(e.key.length===1){
    input+=e.key;
  }

  render();
});

/* ================= COMMAND ================= */

function execute(cmd){

  cmd=cmd.trim().toLowerCase();

  if(cmd==="start()"||cmd==="start"){
    document.getElementById("menu").style.display="none";

    setTimeout(()=>{
      initMap();
      nextRound();
    },200);

    return;
  }

  lines.push("unknown command");
  render();
}

/* ================= MAP ================= */

function initMap(){

  map=L.map("map",{attributionControl:false});

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19
  }).addTo(map);

  map.setView([20,0],2);

  map.on("click",e=>{
    guessPos=e.latlng;

    if(pin)pin.remove();

    pin=L.circleMarker(guessPos,{
      radius:8,
      color:"#fff",
      fillColor:"#c9a84c",
      fillOpacity:1
    }).addTo(map);
  });

  setTimeout(()=>map.invalidateSize(true),300);
}

/* ================= PANORAMA ================= */

function loadPanorama(img){

  document.getElementById("viewer").innerHTML="";

  viewer=new Viewer({
    container:document.getElementById("viewer"),
    panorama:img
  });

  document.getElementById("viewer").style.filter="blur(0px)";
}

/* ================= ROUND ================= */

function nextRound(){

  round++;
  if(round>5){
    alert("Final Score: "+score);
    return;
  }

  document.getElementById("round").innerText=round;

  current=LOCATIONS[Math.floor(Math.random()*LOCATIONS.length)];
  guessPos=null;

  document.getElementById("hint").innerText=current.hint;

  loadPanorama(current.pano);
}

/* ================= GUESS ================= */

document.getElementById("guessBtn").onclick=()=>{

  if(!guessPos){
    alert("Pick a location first");
    return;
  }

  let d=haversine(
    guessPos.lat,
    guessPos.lng,
    current.lat,
    current.lng
  );

  let points=Math.max(0,Math.round(5000-d*2));

  score+=points;
  document.getElementById("score").innerText=score;

  showResults(d,points);
};

/* ================= RESULTS ================= */

function showResults(distance,points){

  document.getElementById("resDistance").innerText=
    "You were " + Math.round(distance) + " km away";

  document.getElementById("resPoints").innerText=
    "You earned " + points + " points";

  document.getElementById("results").style.display="flex";
}

/* ================= NEXT ROUND ================= */

document.getElementById("resNext").onclick=()=>{

  document.getElementById("results").style.display="none";

  nextRound();
};

/* ================= MAP TOGGLE ================= */

document.getElementById("mapBtn").onclick=()=>{
  document.getElementById("mapPanel").classList.toggle("open");
  setTimeout(()=>map.invalidateSize(true),300);
};

/* ================= DIST ================= */

function haversine(a,b,c,d){
  const R=6371,toRad=x=>x*Math.PI/180;

  const dLat=toRad(c-a);
  const dLng=toRad(d-b);

  const s=
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*
    Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

/* ================= START ================= */

window.addEventListener("load",boot);

</script>

</body>
</html>
