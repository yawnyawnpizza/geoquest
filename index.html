<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Panorama</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@5/dist/photo-sphere-viewer.min.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial,sans-serif;
}

/* ================= PANORAMA ================= */

#viewer{
  width:100%;
  height:100%;
  background:black;
}

/* ================= MAP PANEL ================= */

#mapPanel{
  position:fixed;
  left:0;
  bottom:0;

  width:100%;
  height:40%;

  background:#111;

  transform:translateY(100%);
  transition:transform .3s ease;

  z-index:5000;
}

#mapPanel.open{
  transform:translateY(0);
}

#map{
  width:100%;
  height:100%;
}

/* ================= BUTTONS ================= */

button{
  position:fixed;
  z-index:9999;

  padding:12px 16px;

  border:none;
  border-radius:8px;

  font-weight:bold;
  cursor:pointer;
}

/* OPEN MAP BUTTON */
#mapBtn{
  left:10px;
  bottom:10px;
  background:#c9a84c;
}

/* 🔥 GUESS BUTTON NOW INSIDE MAP */
#guessBtn{
  right:10px;
  bottom:10px;

  background:white;
  color:black;
}

/* MAP CONTROLS */
#mapControls{
  position:absolute;
  right:10px;
  bottom:10px;
  z-index:6000;
}

/* INFO */
#info{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);

  z-index:9999;

  background:rgba(0,0,0,.7);
  color:white;

  padding:10px 14px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="viewer"></div>

<div id="info">
  Drag to look around
</div>

<!-- MAP PANEL -->
<div id="mapPanel">

  <div id="map"></div>

  <!-- 🔥 BUTTON NOW ON MAP -->
  <div id="mapControls">
    <button id="guessBtn">Guess</button>
  </div>

</div>

<!-- OPEN MAP -->
<button id="mapBtn">Map</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@5/dist/photo-sphere-viewer.min.js"></script>

<script>

/* ================= LOCATIONS ================= */

const LOCATIONS = [

  {
    name:"Beach",
    lat:25.7907,
    lng:-80.1300,

    pano:
    "https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg"
  },

  {
    name:"Mountain",
    lat:46.8523,
    lng:-121.7603,

    pano:
    "https://photo-sphere-viewer-data.netlify.app/assets/sphere-test.jpg"
  }

];

let current;
let viewer;
let map;
let pin = null;
let guessPos = null;

/* ================= PANORAMA ================= */

function initViewer(image){

  if(viewer){
    viewer.destroy();
  }

  viewer = new PhotoSphereViewer.Viewer({

    container:
      document.querySelector("#viewer"),

    panorama:image,

    navbar:[
      "zoom",
      "fullscreen"
    ],

    mousewheel:true,

    defaultYaw:"0deg",

    touchmoveTwoFingers:false
  });
}

/* ================= MAP ================= */

function initMap(){

  map = L.map("map",{
    attributionControl:false
  });

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom:19
    }
  ).addTo(map);

  map.setView([20,0],2);

  map.on("click",e=>{

    guessPos = e.latlng;

    if(pin){
      pin.remove();
    }

    pin = L.circleMarker(
      guessPos,
      {
        radius:8,
        color:"#fff",
        fillColor:"#c9a84c",
        fillOpacity:1
      }
    ).addTo(map);
  });
}

/* ================= ROUND ================= */

function loadRound(){

  current =
    LOCATIONS[
      Math.floor(
        Math.random() *
        LOCATIONS.length
      )
    ];

  initViewer(current.pano);

  guessPos = null;

  if(pin){
    pin.remove();
    pin = null;
  }
}

/* ================= MAP TOGGLE ================= */

const mapPanel =
  document.getElementById("mapPanel");

document
.getElementById("mapBtn")
.addEventListener("click",()=>{

  mapPanel.classList.toggle("open");

  setTimeout(()=>{
    map.invalidateSize();
  },300);
});

/* ================= GUESS ================= */

document
.getElementById("guessBtn")
.addEventListener("click",()=>{

  if(!guessPos){
    alert("Place a marker first.");
    return;
  }

  const dist = haversine(
    guessPos.lat,
    guessPos.lng,
    current.lat,
    current.lng
  );

  alert(
    current.name +
    "\nDistance: " +
    Math.round(dist) +
    " km"
  );

  // close map after guess
  mapPanel.classList.remove("open");

  loadRound();
});

/* ================= DISTANCE ================= */

function haversine(a,b,c,d){

  const R = 6371;

  const toRad =
    x => x * Math.PI / 180;

  const dLat =
    toRad(c-a);

  const dLng =
    toRad(d-b);

  const s =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a)) *
    Math.cos(toRad(c)) *
    Math.sin(dLng/2)**2;

  return R * 2 *
    Math.atan2(
      Math.sqrt(s),
      Math.sqrt(1-s)
    );
}

/* ================= START ================= */

window.addEventListener("load",()=>{

  initMap();
  loadRound();
});

</script>

</body>
</html>
