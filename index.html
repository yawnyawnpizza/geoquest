<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Fixed</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
}

#game{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

#photo{
  flex:1;
  width:100%;
  object-fit:cover;
}

#map{
  flex:1;
  width:100%;
}

button{
  position:fixed;
  right:10px;
  bottom:10px;
  z-index:9999;
}
</style>
</head>

<body>

<div id="game">
  <img id="photo">
  <div id="map"></div>
  <button onclick="guess()">Guess</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
let map;
let pin;
let guessLatLng = null;

const STATE = {
  lat:43.6426,
  lng:-79.3871,
  wiki:"CN Tower"
};

// ================= MAP =================
function initMap(){
  if(map) map.remove();

  map = L.map('map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  map.setView([20,0],2);

  map.on('click',e=>{
    guessLatLng = e.latlng;

    if(pin) pin.remove();

    pin = L.circleMarker(e.latlng,{
      radius:8,
      color:'#fff',
      fillColor:'#c9a84c',
      fillOpacity:1
    }).addTo(map);
  });

  // 🔥 HARD FIX: wait for layout paint then resize
  requestAnimationFrame(()=>{
    setTimeout(()=>map.invalidateSize(),200);
  });
}

// ================= IMAGE =================
function loadImage(){
  fetch(`https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&pithumbsize=1200&titles=${STATE.wiki}`)
    .then(r=>r.json())
    .then(d=>{
      const page = Object.values(d.query.pages)[0];
      if(page.thumbnail){
        document.getElementById('photo').src = page.thumbnail.source;
      }
    });
}

// ================= GAME =================
function start(){
  initMap();
  loadImage();
}

function guess(){
  if(!guessLatLng) return;

  const dist = haversine(
    guessLatLng.lat,
    guessLatLng.lng,
    STATE.lat,
    STATE.lng
  );

  alert("Distance: " + Math.round(dist) + " km");
}

// ================= DIST =================
function haversine(a,b,c,d){
  const R=6371,toRad=x=>x*Math.PI/180;
  const dLat=toRad(c-a), dLng=toRad(d-b);
  const s=Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

// auto start
start();
</script>

</body>
</html>
