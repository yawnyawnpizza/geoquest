<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Real 360</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial,sans-serif;
}

/* 360 VIEW */
#viewer{
  width:100%;
  height:100%;
  background:black;
}

/* MAP PANEL */
#mapPanel{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:40%;
  background:#111;
  transform:translateY(100%);
  transition:transform .3s ease;
  z-index:5000;
}

#mapPanel.open{
  transform:translateY(0);
}

#map{
  width:100%;
  height:100%;
}

/* BUTTONS */
button{
  position:fixed;
  z-index:9999;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

#mapBtn{
  left:10px;
  bottom:10px;
  background:#c9a84c;
}

#guessBtn{
  position:absolute;
  right:10px;
  bottom:10px;
  background:white;
}
</style>
</head>

<body>

<div id="viewer"></div>

<div id="mapPanel">
  <div id="map"></div>
  <button id="guessBtn">Guess</button>
</div>

<button id="mapBtn">Map</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script type="module">

import { Viewer } from "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/+esm";

/* ================= REAL 360 IMAGE DATASET =================
   These are REAL equirectangular panoramas
*/

const LOCATIONS = [
  {
    name: "Santorini Street",
    lat: 36.3932,
    lng: 25.4615,
    pano: "https://upload.wikimedia.org/wikipedia/commons/3/3a/Santorini_pano_360.jpg"
  },
  {
    name: "New York Skyline",
    lat: 40.7128,
    lng: -74.0060,
    pano: "https://upload.wikimedia.org/wikipedia/commons/9/9e/New_York_City_panorama_2017.jpg"
  },
  {
    name: "Tokyo Panorama",
    lat: 35.6762,
    lng: 139.6503,
    pano: "https://upload.wikimedia.org/wikipedia/commons/1/1e/Tokyo_panorama_360.jpg"
  }
];

let current;
let viewer;
let map;
let pin = null;
let guessPos = null;

/* ================= 360 VIEW ================= */

function loadPanorama(image){

  const container = document.getElementById("viewer");

  container.innerHTML = ""; // clean reset (prevents black bug)

  viewer = new Viewer({
    container,
    panorama: image,
    navbar: ["zoom", "fullscreen"],
    mousewheel: true
  });
}

/* ================= MAP ================= */

function initMap(){

  map = L.map("map",{
    attributionControl:false
  });

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { maxZoom:19 }
  ).addTo(map);

  map.setView([20,0],2);

  map.on("click",e=>{

    guessPos = e.latlng;

    if(pin) pin.remove();

    pin = L.circleMarker(guessPos,{
      radius:8,
      color:"#fff",
      fillColor:"#c9a84c",
      fillOpacity:1
    }).addTo(map);
  });
}

/* ================= ROUND ================= */

function loadRound(){

  current =
    LOCATIONS[Math.floor(Math.random()*LOCATIONS.length)];

  guessPos = null;

  if(pin){
    pin.remove();
    pin = null;
  }

  loadPanorama(current.pano);
}

/* ================= MAP TOGGLE ================= */

const mapPanel =
  document.getElementById("mapPanel");

document.getElementById("mapBtn").addEventListener("click",()=>{

  mapPanel.classList.toggle("open");

  setTimeout(()=>{
    map.invalidateSize();
  },300);
});

/* ================= GUESS ================= */

document.getElementById("guessBtn").addEventListener("click",()=>{

  if(!guessPos){
    alert("Place a marker first.");
    return;
  }

  const dist = haversine(
    guessPos.lat,
    guessPos.lng,
    current.lat,
    current.lng
  );

  alert(
    current.name +
    "\nDistance: " +
    Math.round(dist) +
    " km"
  );

  mapPanel.classList.remove("open");

  loadRound();
});

/* ================= DISTANCE ================= */

function haversine(a,b,c,d){

  const R = 6371;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(c-a);
  const dLng = toRad(d-b);

  const s =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*
    Math.sin(dLng/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

/* ================= START ================= */

window.addEventListener("load",()=>{

  initMap();
  loadRound();

});

</script>

</body>
</html>
