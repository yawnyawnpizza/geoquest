<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest — TEST BUILD</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Courier+Prime:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial;
}

.screen{
  position:absolute;
  inset:0;
  display:none;
}

.screen.show{
  display:block;
}

/* GAME LAYOUT */
#photo-img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  object-fit:cover;
}

#map-leaf{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:50%;
}

/* RESULT */
#result{
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen show">
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <img id="photo-img">
  <div id="map-leaf"></div>
  <button onclick="submitGuess()" style="position:absolute;bottom:10px;right:10px;z-index:999;">
    Guess
  </button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div id="result-text"></div>
  <button onclick="startGame()">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ================= STATE =================
var STATE = {
  name:"CN Tower, Toronto",
  lat:43.6426,
  lng:-79.3871,
  wiki:"CN Tower",
  scoreK:2000
};

var map, pin;
var guess=null;

// ================= HELPERS =================
function haversine(a,b,c,d){
  var R=6371, toRad=x=>x*Math.PI/180;
  var dLat=toRad(c-a), dLng=toRad(d-b);
  var s=Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function score(dist){
  return Math.round(5000*Math.exp(-dist/STATE.scoreK));
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  document.getElementById(id).classList.add('show');

  // 🔥 FIX LEAFLET BLACK SCREEN
  if(map){
    setTimeout(()=>map.invalidateSize(), 200);
  }
}

// ================= GAME =================
function startGame(){
  guess=null;
  show('game');
  initMap();
  loadImage();
}

function initMap(){
  if(map) map.remove();

  map = L.map('map-leaf',{
    zoomControl:true,
    attributionControl:false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
  }).addTo(map);

  map.setView([20,0],2);

  map.on('click',function(e){
    guess = e.latlng;

    if(pin) map.removeLayer(pin);

    pin = L.circleMarker(guess,{
      radius:8,
      color:'#fff',
      fillColor:'#c9a84c',
      fillOpacity:1
    }).addTo(map);
  });

  setTimeout(()=>map.invalidateSize(),200);
}

// ================= IMAGE =================
function loadImage(){
  var url =
    "https://en.wikipedia.org/w/api.php?" +
    "action=query&format=json&origin=*" +
    "&prop=pageimages&pithumbsize=1200" +
    "&titles=" + encodeURIComponent(STATE.wiki);

  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      var page = Object.values(data.query.pages)[0];
      if(page.thumbnail){
        document.getElementById('photo-img').src = page.thumbnail.source;
      }
    })
    .catch(()=>{});
}

// ================= RESULT =================
function submitGuess(){
  if(!guess) return;

  var dist = haversine(
    guess.lat, guess.lng,
    STATE.lat, STATE.lng
  );

  var pts = score(dist);

  document.getElementById('result-text').innerHTML =
    "Distance: " + Math.round(dist) + " km<br>Score: " + pts;

  show('result');
}
</script>

</body>
</html>
