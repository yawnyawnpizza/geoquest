<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

.screen{
  position:absolute;
  inset:0;
  display:none;
}

.screen.active{
  display:block;
}

/* GAME LAYOUT */
#game{
  width:100%;
  height:100%;
}

#photo{
  position:absolute;
  top:0;
  width:100%;
  height:50%;
  object-fit:cover;
}

#map{
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
}

button{
  position:absolute;
  z-index:999;
  right:10px;
  bottom:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <img id="photo">
  <div id="map"></div>
  <button onclick="submitGuess()">Guess</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div id="resultText"></div>
  <button onclick="startGame()">Replay</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ================= STATE =================
const STATE = {
  name:"CN Tower, Toronto",
  lat:43.6426,
  lng:-79.3871,
  wiki:"CN Tower",
  scoreK:2000
};

let map;
let pin;
let guess = null;

// ================= SCREEN SYSTEM =================
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display='none';
  });

  const el = document.getElementById(id);
  el.style.display='block';

  requestAnimationFrame(()=>{
    el.classList.add('active');

    // 🔥 CRITICAL FIX: resize map after layout
    if(map){
      setTimeout(()=>map.invalidateSize(), 100);
    }
  });
}

// ================= GAME =================
function startGame(){
  guess = null;
  show('game');

  setTimeout(()=>{
    initMap();
    loadImage();
  }, 50);
}

function initMap(){
  if(map) map.remove();

  map = L.map('map',{
    zoomControl:true,
    attributionControl:false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
  }).addTo(map);

  map.setView([20,0],2);

  map.on('click',e=>{
    guess = e.latlng;

    if(pin) pin.remove();

    pin = L.circleMarker(guess,{
      radius:8,
      color:'#fff',
      fillColor:'#c9a84c',
      fillOpacity:1
    }).addTo(map);
  });

  setTimeout(()=>map.invalidateSize(),150);
}

// ================= IMAGE =================
function loadImage(){
  const url =
    "https://en.wikipedia.org/w/api.php?" +
    "action=query&format=json&origin=*" +
    "&prop=pageimages&pithumbsize=1200" +
    "&titles=" + encodeURIComponent(STATE.wiki);

  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      const page = Object.values(data.query.pages)[0];
      if(page.thumbnail){
        document.getElementById('photo').src = page.thumbnail.source;
      }
    })
    .catch(()=>{});
}

// ================= DISTANCE =================
function haversine(a,b,c,d){
  const R=6371,toRad=x=>x*Math.PI/180;
  const dLat=toRad(c-a), dLng=toRad(d-b);
  const s=Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function score(dist){
  return Math.round(5000*Math.exp(-dist/STATE.scoreK));
}

// ================= RESULT =================
function submitGuess(){
  if(!guess) return;

  const dist = haversine(
    guess.lat, guess.lng,
    STATE.lat, STATE.lng
  );

  const pts = score(dist);

  document.getElementById('resultText').innerHTML =
    `Distance: ${Math.round(dist)} km<br>Score: ${pts}`;

  show('result');
}
</script>

</body>
</html>
