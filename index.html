<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Fixed</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  width:100%;
  background:#000;
  overflow:hidden;
}

/* FULL SCREEN FIX */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

/* IMAGE */
#photo{
  flex:1;
  width:100%;
  min-height:0;
  object-fit:cover;
  display:block;
  background:#111;
}

/* MAP */
#map{
  flex:1;
  width:100%;
  min-height:0;
}

/* Leaflet hard fill fix */
.leaflet-container{
  width:100% !important;
  height:100% !important;
}

/* BUTTON */
button{
  position:fixed;
  right:10px;
  bottom:10px;
  z-index:9999;
}
</style>
</head>

<body>

<div id="game" class="screen active">
  <img id="photo">
  <div id="map"></div>
  <button onclick="guess()">Guess</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>

const STATE = {
  lat: 43.6426,
  lng: -79.3871,
  wiki: "CN Tower"
};

let map;
let pin;
let guessPos = null;

/* ================= MAP ================= */
function initMap(){

  if(map) map.remove();

  map = L.map('map',{
    zoomControl:true,
    attributionControl:false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  map.setView([20,0],2);

  map.on('click',e=>{
    guessPos = e.latlng;

    if(pin) pin.remove();

    pin = L.circleMarker(guessPos,{
      radius:8,
      color:'#fff',
      fillColor:'#c9a84c',
      fillOpacity:1
    }).addTo(map);
  });

  // stable render fix
  setTimeout(()=>{
    map.invalidateSize();
  },200);
}

/* ================= IMAGE ================= */
function loadImage(){
  const url =
    "https://en.wikipedia.org/w/api.php?" +
    "action=query&format=json&origin=*" +
    "&prop=pageimages&piprop=thumbnail&pithumbsize=1200" +
    "&redirects=1" +
    "&titles=" + encodeURIComponent(STATE.wiki);

  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      const page = Object.values(data.query.pages)[0];

      if(page.thumbnail){
        document.getElementById('photo').src = page.thumbnail.source;
      } else {
        document.getElementById('photo').style.background = "#222";
      }
    })
    .catch(()=>{
      document.getElementById('photo').style.background = "#222";
    });
}

/* ================= GUESS ================= */
function guess(){
  if(!guessPos) return;

  const dist = haversine(
    guessPos.lat,
    guessPos.lng,
    STATE.lat,
    STATE.lng
  );

  alert("Distance: " + Math.round(dist) + " km");
}

/* ================= DIST ================= */
function haversine(a,b,c,d){
  const R=6371,toRad=x=>x*Math.PI/180;
  const dLat=toRad(c-a), dLng=toRad(d-b);

  const s =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

/* ================= START (FIXED TIMING) ================= */
window.addEventListener("load", () => {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      loadImage();
      initMap();
    });
  });
});

</script>

</body>
</html>
