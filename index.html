<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:monospace;
}

/* VIEW */
#viewer{
  width:100%;
  height:100%;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:8px;
}

/* MAP */
#mapPanel{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:40%;
  background:#111;
  transform:translateY(100%);
  transition:0.3s;
  z-index:5000;
}

#mapPanel.open{ transform:translateY(0); }

#map{ width:100%; height:100%; }

/* BUTTONS */
button{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

#mapBtn{
  position:fixed;
  left:10px;
  bottom:10px;
  z-index:9999;
  background:#c9a84c;
}

#guessBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:999999;
  background:white;
}

#moveUI{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999999;
}

.moveBtn{
  background:#222;
  color:white;
}

/* RESULTS */
#results{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999999;
}

#resultsBox{
  background:#111;
  color:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div id="viewer"></div>

<div id="hud">
Score: <span id="score">0</span>
</div>

<div id="mapPanel">
  <div id="map"></div>
</div>

<div id="moveUI"></div>

<button id="mapBtn">Map</button>
<button id="guessBtn">Guess</button>

<div id="results">
  <div id="resultsBox">
    <h2>Result</h2>
    <p id="resDistance"></p>
    <p id="resPoints"></p>
    <button onclick="nextRound()">Next Round</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script type="module">

import { Viewer } from "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/+esm";

/* ================= SAFE FALLBACK ================= */

const FALLBACK_PANO =
"https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg";

/* ================= NODE MAP ================= */

const NODES = {
  nyc: {
    lat:40.7128,
    lng:-74.0060,
    pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg",
    links:["cn_tower"]
  },

  cn_tower: {
    lat:43.6426,
    lng:-79.3871,
    pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere-test.jpg",
    links:["nyc","tokyo"]
  },

  tokyo: {
    lat:35.6762,
    lng:139.6503,
    pano:"https://photo-sphere-viewer-data.netlify.app/assets/sphere-small.jpg",
    links:["cn_tower"]
  }
};

let currentNode="nyc";
let viewer,map,pin,guessPos;
let score=0;
let loadToken=0;

/* ================= SAFE IMAGE LOAD ================= */

function loadImageSafe(url){
  return new Promise(resolve=>{
    const img=new Image();

    img.onload=()=>resolve(url);
    img.onerror=()=>resolve(FALLBACK_PANO);

    img.src=url;
  });
}

/* ================= LOAD NODE ================= */

async function loadNode(id){

  const token=++loadToken;

  currentNode=id;
  const node=NODES[id];

  const safe=await loadImageSafe(node.pano);

  if(token!==loadToken) return;

  document.getElementById("viewer").innerHTML="";

  viewer=new Viewer({
    container:document.getElementById("viewer"),
    panorama:safe
  });

  renderMoves();
}

/* ================= MOVEMENT ================= */

function renderMoves(){

  const ui=document.getElementById("moveUI");
  ui.innerHTML="";

  NODES[currentNode].links.forEach(link=>{

    const b=document.createElement("button");
    b.className="moveBtn";
    b.innerText="Move";

    b.onclick=()=>loadNode(link);

    ui.appendChild(b);
  });
}

/* ================= MAP ================= */

function initMap(){

  map=L.map("map").setView([20,0],2);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
  .addTo(map);

  map.on("click",e=>{
    guessPos=e.latlng;

    if(pin)pin.remove();

    pin=L.circleMarker(guessPos,{
      radius:8,
      color:"#fff",
      fillColor:"#c9a84c",
      fillOpacity:1
    }).addTo(map);
  });
}

/* ================= GUESS ================= */

document.getElementById("guessBtn").onclick=()=>{

  if(!guessPos)return;

  const node=NODES[currentNode];

  let d=haversine(
    guessPos.lat,guessPos.lng,
    node.lat,node.lng
  );

  let points=Math.max(0,Math.round(5000-d*2));

  score+=points;
  document.getElementById("score").innerText=score;

  document.getElementById("resDistance").innerText=
    "You were " + Math.round(d) + " km away";

  document.getElementById("resPoints").innerText=
    "Points: " + points;

  document.getElementById("results").style.display="flex";
};

/* ================= NEXT ================= */

window.nextRound=function(){
  document.getElementById("results").style.display="none";
  loadNode("nyc");
};

/* ================= MAP BUTTON ================= */

document.getElementById("mapBtn").onclick=()=>{
  document.getElementById("mapPanel").classList.toggle("open");
  setTimeout(()=>map.invalidateSize(),300);
};

/* ================= DIST ================= */

function haversine(a,b,c,d){
  const R=6371,toRad=x=>x*Math.PI/180;

  const dLat=toRad(c-a);
  const dLng=toRad(d-b);

  const s=
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*
    Math.sin(dLng/2)**2;

  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

/* ================= START ================= */

loadNode("nyc");
initMap();

</script>
</body>
</html>
