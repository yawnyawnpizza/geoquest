<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Free Street View</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  background:black;
}

/* TOP "STREET VIEW" IMAGE */
#pano{
  height:60%;
  width:100%;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* BOTTOM MAP */
#map{
  height:40%;
  width:100%;
}

button{
  position:fixed;
  bottom:10px;
  right:10px;
  z-index:9999;
}
</style>
</head>

<body>

<div id="pano"></div>
<div id="map"></div>
<button onclick="guess()">Guess</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>

/* ================= GAME DATA =================
   You will add more locations here later
*/
const LOCATIONS = [
  {
    name: "CN Tower",
    lat: 43.6426,
    lng: -79.3871,
    image: "https://upload.wikimedia.org/wikipedia/commons/9/9c/CN_Tower_from_Below.jpg"
  },
  {
    name: "Eiffel Tower",
    lat: 48.8584,
    lng: 2.2945,
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg"
  },
  {
    name: "Statue of Liberty",
    lat: 40.6892,
    lng: -74.0445,
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Statue_of_Liberty_7.jpg"
  }
];

let current = null;
let map;
let guessPos = null;
let pin;

/* ================= LOAD ROUND ================= */
function loadRound(){
  current = LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)];

  document.getElementById("pano").style.backgroundImage =
    `url(${current.image})`;

  guessPos = null;

  if(pin){
    pin.remove();
    pin = null;
  }
}

/* ================= MAP ================= */
function initMap(){

  map = L.map('map',{
    zoomControl:true,
    attributionControl:false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  map.setView([20,0],2);

  map.on('click',e=>{
    guessPos = e.latlng;

    if(pin) pin.remove();

    pin = L.circleMarker(guessPos,{
      radius:8,
      color:'#fff',
      fillColor:'#c9a84c',
      fillOpacity:1
    }).addTo(map);
  });
}

/* ================= GUESS ================= */
function guess(){
  if(!guessPos || !current) return;

  const dist = haversine(
    guessPos.lat,
    guessPos.lng,
    current.lat,
    current.lng
  );

  alert(
    current.name +
    "\nDistance: " +
    Math.round(dist) +
    " km"
  );

  loadRound();
}

/* ================= DISTANCE ================= */
function haversine(a,b,c,d){
  const R = 6371;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(c - a);
  const dLng = toRad(d - b);

  const s =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(a))*Math.cos(toRad(c))*
    Math.sin(dLng/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

/* ================= START ================= */
function start(){
  initMap();
  loadRound();
}

window.addEventListener("load", start);

</script>

</body>
</html>
